<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emoji Picture Abhiyaan — Bollywood Charades</title>
<meta name="description" content="A two-to-six player pass-and-play game: turn a Bollywood movie into an emoji sequence and see who can guess it in three tries." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #1B0E08;
    --bg-card: #241409;
    --gold: #F2B705;
    --gold-dim: #C99A2E;
    --vermillion: #C8102E;
    --ivory: #FBF1DD;
    --ivory-dim: #C9BBA0;
    --teal: #2E7D6B;
    --bronze: #9C6B30;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    background-image:

      radial-gradient(circle at 15% 10%, rgba(242,183,5,0.07), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(200,16,46,0.08), transparent 40%);

    color: var(--ivory);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
    padding: 20px 12px 26px;
    position: relative;
  }

  header::before, header::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background-image: radial-gradient(circle, var(--gold) 1.5px, transparent 1.6px);
    background-size: 18px 1px;
    background-repeat: repeat-x;
    opacity: 0.75;
    animation: twinkle 2.2s ease-in-out infinite alternate;
  }
  header::before { top: 0; }
  header::after { bottom: 0; }

  @keyframes twinkle {
    from { opacity: 0.35; }
    to { opacity: 0.9; }
  }

  @media (prefers-reduced-motion: reduce) {
    header::before, header::after { animation: none; opacity: 0.6; }
  }

  h1 {
    font-family: 'Rozha One', serif;
    font-weight: 400;
    font-size: clamp(28px, 6vw, 42px);
    letter-spacing: 0.5px;
    color: var(--gold);
    margin: 18px 0 6px;
    text-shadow: 0 0 18px rgba(242,183,5,0.25);
  }

  .subtitle {
    color: var(--ivory-dim);
    font-size: 14px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin: 0;
  }

  .scoreboard {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 22px;
  }

  .score-card {
    flex: 1 1 120px;
    background: var(--bg-card);
    border: 1px solid rgba(242,183,5,0.18);
    border-radius: var(--radius);
    padding: 12px 16px;
  }

  .score-card.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold) inset;
  }

  .score-card .name {
    font-size: 12.5px;
    color: var(--ivory-dim);
    margin: 0 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score-card .points {
    font-family: 'Rozha One', serif;
    font-size: 26px;
    color: var(--gold);
    margin: 0;
  }




  .stage {
    background: var(--bg-card);
    border-radius: 20px;
    border: 1px solid rgba(242,183,5,0.15);
    padding: 28px 22px;
  }

  .lead {
    font-size: 15.5px;
    color: var(--ivory);
    margin: 0 0 18px;
    line-height: 1.5;
  }

  .lead strong { color: var(--gold); }

  .count-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  button {
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 14.5px;
    color: var(--ivory);
    background: rgba(251,241,221,0.05);
    border: 1px solid rgba(251,241,221,0.18);
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:hover { background: rgba(242,183,5,0.12); border-color: var(--gold-dim); }
  button:active { transform: scale(0.98); }
  button.primary {
    background: var(--gold);
    color: #2A1904;
    border-color: var(--gold);
    font-weight: 600;
  }
  button.primary:hover { background: #FFC71F; }
  button.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  button.wide { width: 100%; }

  input[type="text"] {
    width: 100%;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    color: var(--ivory);
    background: rgba(251,241,221,0.05);
    border: 1px solid rgba(251,241,221,0.2);
    border-radius: 10px;
    padding: 11px 14px;
    margin-bottom: 10px;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(242,183,5,0.25);
  }

  input::placeholder { color: rgba(251,241,221,0.35); }

  .name-fields { margin-bottom: 4px; }

  .divider {
    border-top: 1px solid rgba(251,241,221,0.12);
    padding-top: 16px;
    margin-top: 18px;
  }

  .hint { font-size: 12.5px; color: var(--ivory-dim); margin: 0 0 10px; }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 22px;
  }

  .preset-grid button { text-align: left; }

  .pass-box, .result-box {
    text-align: center;
    padding: 10px 4px 6px;
  }

  .pass-box .icon, .result-box .icon {
    font-size: 34px;
    margin-bottom: 6px;
  }




  .screen-display {
    background: var(--bg-deep);
    border: 1px dashed rgba(242,183,5,0.35);
    border-radius: 14px;
    padding: 36px 16px;
    text-align: center;
    margin-bottom: 18px;
  }

  .emoji-line {
    font-size: clamp(34px, 9vw, 52px);
    letter-spacing: 8px;
    margin: 0;
  }

  .guess-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--ivory-dim);
  }

  .tries-left { color: var(--gold); font-weight: 600; }

  .wrong-note {
    font-size: 13px;
    color: var(--vermillion);
    margin: 0 0 10px;
  }

  .action-row { display: flex; gap: 8px; }

  .result-title {
    font-family: 'Rozha One', serif;
    font-size: 24px;
    color: var(--gold);
    margin: 10px 0 20px;
  }

  .status-correct { color: #6FCB9F; }
  .status-wrong { color: var(--vermillion); }

  footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: rgba(251,241,221,0.35);
  }

  @media (max-width: 480px) {
    .stage { padding: 22px 16px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Emoji Picture Abhiyaan</h1>
    <p class="subtitle">A Bollywood guessing game, pass and play</p>
  </header>

  <div class="scoreboard" id="scoreboard"></div>
  <div class="stage" id="stage"></div>

  <footer>Built for movie nights &middot; three guesses per round</footer>
</div>

<script>
const MOVIES = [
  {t:"Lagaan", e:"🏏🌾👳‍♂️🇬🇧", a:[]},
  {t:"3 Idiots", e:"🎓📚🤪🎓", a:["3idiots"]},
  {t:"Toilet Ek Prem Katha", e:"🚽👆🏻❤️🧾", a:[]},
  {t:"Chandni Chowk to China", e:"🌙😱🇨🇳", a:[]},
  {t:"Mr. India", e:"🕵🏻🇮🇳", a:[]},
  {t:"Sholay", e:"🔫🐴🎭😈", a:[]},
  {t:"Zindagi Na Milegi Dobara", e:"✈️🏍️🍷👬", a:["znmd"]},
  {t:"Akele Hum Akele Tum", e:"☝🏻✋🏻☝🏻👉🏻", a:["k3g"]},
  {t:"Chak De India", e:"🏑🇮🇳👩‍🦱🏆", a:["chak de"]},
  {t:"Bajrangi Bhaijaan", e:"🙏🇮🇳🇵🇰👧", a:[]}
  {t:"Dangal", e:"🤼‍♀️👨‍👧‍👧🥇", a:[]},
  {t:"Queen", e:"✈️💃🎉👰", a:[]},
  {t:"Andaz Apna Apna", e:"😂🤡💰👬", a:[]},
  {t:"Barfi", e:"🤟😊💔🎩", a:["barfi!"]},
  {t:"Gully Boy", e:"🎤🛺🔥🎧", a:[]},
  {t:"PK", e:"👽📿❓📻", a:[]},
  {t:"Golmaal", e:"😂🏚️👬🤥", a:[]},
  {t:"Jab We Met", e:"🚂👫💑🚉", a:[]},
  {t:"Rockstar", e:"🎸💔🎤🕊️", a:[]},
  {t:"Yeh Jawaani Hai Deewani", e:"🏔️💃🍻🎒", a:["yjhd"]},
  {t:"Om Shanti Om", e:"🔥🎬♻️⭐", a:["osо"]},
  {t:"Swades", e:"🚀🇮🇳🏡💡", a:[]},
  {t:"Taare Zameen Par", e:"🎨👦😢✏️", a:["tzp"]},
  {t:"Gadar", e:"🚂❤️🇮🇳🇵🇰", a:[]}
];


const MAX_TRIES = 3;
function norm(s){ return s.toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim(); }

const state = {
  numPlayers: 2,
  players: [],
  scores: [],
  turnPointer: 0,
  phase: "players",
  current: null,
  tries: 0,
  lastWrongGuess: "",
  lastCorrect: false
};

const numPlayersCount = () => state.players.length;
const setterIdx = () => state.turnPointer % numPlayersCount();
const guesserIdx = () => (state.turnPointer + 1) % numPlayersCount();

function renderScoreboard(){
  const el = document.getElementById("scoreboard");
  if (state.phase === "players") { el.innerHTML = ""; return; }
  el.innerHTML = state.players.map((p, i) => `
    <div class="score-card ${i === setterIdx() && state.phase !== 'result' ? 'active' : ''}">
      <p class="name">${escapeHtml(p)}${i === setterIdx() && state.phase !== 'result' ? ' &middot; setting' : ''}</p>
      <p class="points">${state.scores[i]}</p>
    </div>
  `).join("");
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function renderPlayerSetup(){
  const stage = document.getElementById("stage");
  stage.innerHTML = `
    <p class="lead">How many players are joining tonight?</p>
    <div class="count-row" id="count-row"></div>
    <div class="name-fields" id="name-fields"></div>
    <button class="primary wide" id="start-game">Start game</button>
  `;
  const countRow = document.getElementById("count-row");
  [2,3,4,5,6].forEach(c => {
    const btn = document.createElement("button");
    btn.textContent = c;
    if (c === state.numPlayers) btn.classList.add("selected");
    btn.onclick = () => { state.numPlayers = c; renderPlayerSetup(); };
    countRow.appendChild(btn);
  });
  const nameFields = document.getElementById("name-fields");
  nameFields.innerHTML = Array.from({length: state.numPlayers}).map((_, i) => `
    <input type="text" id="name-${i}" placeholder="Player ${i + 1}" value="${state.players[i] ? escapeHtml(state.players[i]) : ''}" />
  `).join("");
  document.getElementById("start-game").onclick = () => {
    state.players = Array.from({length: state.numPlayers}).map((_, i) => {
      const v = document.getElementById(`name-${i}`).value.trim();
      return v || `Player ${i + 1}`;
    });
    state.scores = state.players.map(() => 0);
    state.turnPointer = 0;
    state.phase = "setup";
    render();
  };
}

function renderSetup(){
  const setterName = state.players[setterIdx()];
  const guesserName = state.players[guesserIdx()];
  const stage = document.getElementById("stage");
  stage.innerHTML = `
    <p class="lead"><strong>${escapeHtml(setterName)}</strong>, pick a movie for <strong>${escapeHtml(guesserName)}</strong> to guess. Choose from the list or write your own.</p>
    <div class="preset-grid" id="preset-grid"></div>
    <div class="divider">
      <p class="hint">Or create your own</p>
      <input type="text" id="custom-title" placeholder="Movie title" />
      <input type="text" id="custom-emoji" placeholder="Emoji sequence" />
      <button class="primary wide" id="custom-submit">Use this movie</button>
    </div>
  `;
  const grid = document.getElementById("preset-grid");
  MOVIES.forEach((m) => {
    const btn = document.createElement("button");
    btn.textContent = m.t;
    btn.onclick = () => { state.current = {t: m.t, e: m.e, a: m.a}; state.tries = 0; state.phase = "pass"; render(); };
    grid.appendChild(btn);
  });
  document.getElementById("custom-submit").onclick = () => {
    const t = document.getElementById("custom-title").value.trim();
    const e = document.getElementById("custom-emoji").value.trim();
    if (!t || !e) return;
    state.current = {t, e, a: []};
    state.tries = 0;
    state.phase = "pass";
    render();
  };
}

function renderPass(){
  const stage = document.getElementById("stage");
  stage.innerHTML = `
    <div class="pass-box">
      <div class="icon">🎬</div>
      <p class="lead">Pass the screen to <strong>${escapeHtml(state.players[guesserIdx()])}</strong></p>
      <button class="primary" id="ready-btn">I'm ready to guess</button>
    </div>
  `;
  document.getElementById("ready-btn").onclick = () => { state.phase = "guess"; render(); };
}

function renderGuess(){
  const stage = document.getElementById("stage");
  const triesLeft = MAX_TRIES - state.tries;
  stage.innerHTML = `
    <div class="screen-display"><p class="emoji-line">${state.current.e}</p></div>
    <div class="guess-meta">
      <span>${escapeHtml(state.players[guesserIdx()])}, name that movie</span>
      <span class="tries-left">${triesLeft} ${triesLeft === 1 ? 'try' : 'tries'} left</span>
    </div>
    ${state.lastWrongGuess ? `<p class="wrong-note">"${escapeHtml(state.lastWrongGuess)}" wasn't it</p>` : ""}
    <input type="text" id="guess-input" placeholder="Movie title" />
    <div class="action-row">
      <button class="primary" id="submit-guess" style="flex:1;">Submit guess</button>
      <button id="give-up">Give up</button>
    </div>
  `;
  const input = document.getElementById("guess-input");
  input.focus();
  input.addEventListener("keydown", (ev) => { if (ev.key === "Enter") checkGuess(input.value); });
  document.getElementById("submit-guess").onclick = () => checkGuess(input.value);
  document.getElementById("give-up").onclick = () => finishRound(false);
}

function checkGuess(val){
  if (!val.trim()) return;
  const ok = norm(val) === norm(state.current.t) || state.current.a.some(a => norm(a) === norm(val));
  if (ok) { finishRound(true); return; }
  state.tries += 1;
  state.lastWrongGuess = val.trim();
  if (state.tries >= MAX_TRIES) { finishRound(false); return; }
  render();
}

function finishRound(correct){
  state.lastCorrect = correct;
  if (correct) state.scores[guesserIdx()] += 1;
  state.lastWrongGuess = "";
  state.phase = "result";
  render();
}

function renderResult(){
  const stage = document.getElementById("stage");
  const winnerName = state.players[guesserIdx()];
  stage.innerHTML = `
    <div class="result-box">
      <div class="icon ${state.lastCorrect ? 'status-correct' : 'status-wrong'}">${state.lastCorrect ? '✅' : '❌'}</div>
      <p class="lead">${state.lastCorrect ? escapeHtml(winnerName) + " got it right" : "Out of tries"}</p>
      <p class="result-title">${escapeHtml(state.current.t)}</p>
      <button class="primary" id="next-round">Next round</button>
    </div>
  `;
  document.getElementById("next-round").onclick = () => {
    state.turnPointer = (state.turnPointer + 1) % numPlayersCount();
    state.current = null;
    state.tries = 0;
    state.phase = "setup";
    render();
  };
}

function render(){
  renderScoreboard();
  if (state.phase === "players") renderPlayerSetup();
  else if (state.phase === "setup") renderSetup();
  else if (state.phase === "pass") renderPass();
  else if (state.phase === "guess") renderGuess();
  else if (state.phase === "result") renderResult();
}

render();
</script>
</body>
</html>
