<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emoji Charades</title>

<meta name="description" content="A two-to-six player pass-and-play game: turn a Bollywood movie into an emoji sequence and see who can guess it in three tries." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #200610;
    --bg-card: #34091A;
    --gold: #FFC93C;
    --gold-dim: #D9A441;
    --vermillion: #E63950;
    --magenta: #C2185B;
    --ivory: #FDF3E7;
    --ivory-dim: #DCC3AE;
    --teal: #2E7D6B;
    --bronze: #9C6B30;
    --radius: 14px;
  }


  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(255,201,60,0.16), transparent 60%),
      radial-gradient(circle at 10% 15%, rgba(226,57,80,0.16), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(194,24,91,0.18), transparent 45%),
      repeating-linear-gradient(115deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px),
      var(--bg-deep);
    color: var(--ivory);
    font-family: 'Mukta', sans-serif;
    min-height: 100vh;
  }

  .filmstrip {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 26px;
    background-color: #120209;
    background-image: radial-gradient(circle, var(--bg-deep) 5px, transparent 5.5px);
    background-size: 26px 34px;
    background-position: center;
    z-index: 0;
    opacity: 0.9;
  }
  .filmstrip.left { left: 0; }
  .filmstrip.right { right: 0; }

  @media (max-width: 820px) {
    .filmstrip { display: none; }
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 64px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
    padding: 20px 12px 26px;
    position: relative;
  }

  header::before, header::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background-image: radial-gradient(circle, var(--gold) 2px, transparent 2.2px);
    background-size: 20px 3px;
    background-repeat: repeat-x;
    opacity: 0.8;
    animation: twinkle 1.6s ease-in-out infinite alternate;
  }
  header::before { top: 0; }
  header::after { bottom: 0; animation-delay: 0.4s; }

  @keyframes twinkle {
    from { opacity: 0.3; filter: brightness(0.85); }
    to { opacity: 1; filter: brightness(1.3); }
  }

  @media (prefers-reduced-motion: reduce) {
    header::before, header::after { animation: none; opacity: 0.6; }
  }

  h1 {
    font-family: 'Baloo Bhaijaan 2', cursive;
    font-weight: 800;
    font-size: clamp(32px, 7vw, 50px);
    letter-spacing: 0.5px;
    color: var(--gold);
    margin: 22px 0 8px;
    text-shadow:
      0 0 22px rgba(255,201,60,0.45),
      0 2px 0 rgba(230,57,80,0.5);
  }

  .subtitle {
    font-family: 'Baloo Bhaijaan 2', cursive;
    color: var(--ivory-dim);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin: 0;
  }

  .scoreboard {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 22px;
  }

  .score-card {
    flex: 1 1 120px;
    background: linear-gradient(160deg, var(--bg-card), #2A0813);
    border: 1px solid rgba(255,201,60,0.2);
    border-radius: var(--radius);
    padding: 12px 16px;
  }

  .score-card.active {
    border-color: var(--gold);
    border-width: 2px;
    box-shadow: 0 0 0 1px var(--gold) inset, 0 0 16px rgba(255,201,60,0.35);
  }

  .score-card .name {
    font-size: 12.5px;
    color: var(--ivory-dim);
    margin: 0 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score-card .points {
    font-family: 'Baloo Bhaijaan 2', cursive;
    font-weight: 700;
    font-size: 26px;
    color: var(--gold);
    margin: 0;
  }




  .stage {
    background: linear-gradient(165deg, var(--bg-card), #2A0813 60%, #38091C);
    border-radius: 20px;
    border: 1px solid rgba(255,201,60,0.18);
    box-shadow: 0 0 0 1px rgba(194,24,91,0.08), 0 18px 40px rgba(0,0,0,0.35);
    padding: 28px 22px;
  }

  .lead {
    font-size: 15.5px;
    color: var(--ivory);
    margin: 0 0 18px;
    line-height: 1.5;
  }

  .lead strong { color: var(--gold); }

  .count-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  button {
    font-family: 'Mukta', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    color: var(--ivory);
    background: rgba(253,243,231,0.05);
    border: 1px solid rgba(253,243,231,0.18);
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:hover { background: rgba(255,201,60,0.12); border-color: var(--gold-dim); }
  button:active { transform: scale(0.98); }
  button.primary {
    background: linear-gradient(135deg, var(--gold), #FFA53C);
    color: #2A0813;
    border-color: var(--gold);
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(255,201,60,0.25);
  }
  button.primary:hover { background: linear-gradient(135deg, #FFD75C, #FFB65C); }
  button.selected { border-color: var(--vermillion); box-shadow: 0 0 0 1px var(--vermillion) inset; color: var(--gold); }
  button.wide { width: 100%; }
  #give-up { border-color: rgba(230,57,80,0.35); }
  #give-up:hover { background: rgba(230,57,80,0.14); border-color: var(--vermillion); }

  input[type="text"] {
    width: 100%;
    font-family: 'Mukta', sans-serif;
    font-size: 15px;
    color: var(--ivory);
    background: rgba(253,243,231,0.05);
    border: 1px solid rgba(253,243,231,0.2);
    border-radius: 10px;
    padding: 11px 14px;
    margin-bottom: 10px;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(242,183,5,0.25);
  }

  input::placeholder { color: rgba(251,241,221,0.35); }

  .name-fields { margin-bottom: 4px; }

  .divider {
    border-top: 1px solid rgba(251,241,221,0.12);
    padding-top: 16px;
    margin-top: 18px;
  }

  .hint { font-size: 12.5px; color: var(--ivory-dim); margin: 0 0 10px; }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 22px;
  }

  .preset-grid button { text-align: left; }

  .pass-box, .result-box {
    text-align: center;
    padding: 10px 4px 6px;
  }

  .pass-box .icon, .result-box .icon {
    font-size: 34px;
    margin-bottom: 6px;
  }




  .screen-display {
    background: radial-gradient(circle at 50% 40%, rgba(255,201,60,0.08), var(--bg-deep) 70%);
    border: 1px dashed rgba(255,201,60,0.4);
    border-radius: 14px;
    padding: 36px 16px;
    text-align: center;
    margin-bottom: 18px;
  }

  .emoji-line {
    font-size: clamp(34px, 9vw, 52px);
    letter-spacing: 8px;
    margin: 0;
  }

  .guess-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--ivory-dim);
  }

  .tries-left { color: var(--gold); font-weight: 600; }

  .wrong-note {
    font-size: 13px;
    color: var(--vermillion);
    margin: 0 0 10px;
  }

  .action-row { display: flex; gap: 8px; }

  .result-title {
    font-family: 'Baloo Bhaijaan 2', cursive;
    font-weight: 700;
    font-size: 26px;
    color: var(--gold);
    margin: 10px 0 20px;
  }

  .status-correct { color: #6FCB9F; }
  .status-wrong { color: var(--vermillion); }

  footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: rgba(251,241,221,0.35);
  }

  @media (max-width: 480px) {
    .stage { padding: 22px 16px; }
  }
</style>
</head>


<body>

<div class="filmstrip left" aria-hidden="true"></div>
<div class="filmstrip right" aria-hidden="true"></div>
<div class="wrap">

  <header>
    <h1>Emoji Charades</h1>
    <p class="subtitle">Decode the emojis, defend your Bollywood honor</p>
  </header>

  <div class="scoreboard" id="scoreboard"></div>
  <div class="stage" id="stage"></div>

  <footer>HAPPY EMOJI DAY😉 from Harshita(✿◡‿◡)</footer>
</div>

<script>
const MOVIES = [
  {t:"Chandni Chowk to China", e:"🌙😱✌️🇨🇳", a:[]},
  {t:"Mr. India", e:"🕵🏻🇮🇳", a:[]},
  {t:"Lagaan", e:"🏏🌾👳‍♂️🇬🇧", a:[]},
  {t:"Akele Hum Akele Tum", e:"☝🏻✋🏻☝🏻👉🏻", a:["k3g"]},
  {t:"Chak De India", e:"🏑🇮🇳👩‍🦱🏆", a:["chak de"]},
  {t:"Bajrangi Bhaijaan", e:"🙏🇮🇳🇵🇰👧", a:[]},
  {t:"Dangal", e:"🤼‍♀️👨‍👧‍👧🥇", a:[]},
  {t:"Queen", e:"✈️💃🎉👰", a:[]},
  {t:"PK", e:"👽📿❓📻", a:[]},
];

const MAX_TRIES = 3;
function norm(s){ return s.toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim(); }

const state = {
  numPlayers: 2,
  players: [],
  scores: [],
  turnPointer: 0,
  phase: "players",
  current: null,
  tries: 0,
  lastWrongGuess: "",
  lastCorrect: false
};


const numPlayersCount = () => state.players.length;
const setterIdx = () => state.turnPointer % numPlayersCount();
const guesserIdx = () => (state.turnPointer + 1) % numPlayersCount();

function renderScoreboard(){
  const el = document.getElementById("scoreboard");
  if (state.phase === "players") { el.innerHTML = ""; return; }
  el.innerHTML = state.players.map((p, i) => `
    <div class="score-card ${i === setterIdx() && state.phase !== 'result' ? 'active' : ''}">
      <p class="name">${escapeHtml(p)}${i === setterIdx() && state.phase !== 'result' ? ' &middot; setting' : ''}</p>
      <p class="points">${state.scores[i]}</p>
    </div>
  `).join("");
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function renderPlayerSetup(){
  const stage = document.getElementById("stage");
  stage.innerHTML = `
    <p class="lead">How many players are joining tonight?</p>
    <div class="count-row" id="count-row"></div>
    <div class="name-fields" id="name-fields"></div>
    <button class="primary wide" id="start-game">Start game</button>
  `;
  const countRow = document.getElementById("count-row");
  [2,3,4,5,6].forEach(c => {
    const btn = document.createElement("button");
    btn.textContent = c;
    if (c === state.numPlayers) btn.classList.add("selected");
    btn.onclick = () => { state.numPlayers = c; renderPlayerSetup(); };
    countRow.appendChild(btn);
  });
  const nameFields = document.getElementById("name-fields");
  nameFields.innerHTML = Array.from({length: state.numPlayers}).map((_, i) => `
    <input type="text" id="name-${i}" placeholder="Player ${i + 1}" value="${state.players[i] ? escapeHtml(state.players[i]) : ''}" />
  `).join("");
  document.getElementById("start-game").onclick = () => {
    state.players = Array.from({length: state.numPlayers}).map((_, i) => {
      const v = document.getElementById(`name-${i}`).value.trim();
      return v || `Player ${i + 1}`;
    });
    state.scores = state.players.map(() => 0);
    state.turnPointer = 0;
    state.phase = "setup";
    render();
  };
}

function renderSetup(){
  const setterName = state.players[setterIdx()];
  const guesserName = state.players[guesserIdx()];
  const stage = document.getElementById("stage");
  stage.innerHTML = `
    <p class="lead"><strong>${escapeHtml(setterName)}</strong>, pick a movie for <strong>${escapeHtml(guesserName)}</strong> to guess. Choose from the list or write your own.</p>
    <div class="preset-grid" id="preset-grid"></div>
    <div class="divider">
      <p class="hint">Or create your own</p>
      <input type="text" id="custom-title" placeholder="Movie title" />
      <input type="text" id="custom-emoji" placeholder="Emoji sequence" />
      <button class="primary wide" id="custom-submit">Use this movie</button>
    </div>
  `;
  const grid = document.getElementById("preset-grid");
  MOVIES.forEach((m) => {
    const btn = document.createElement("button");
    btn.textContent = m.t;
    btn.onclick = () => { state.current = {t: m.t, e: m.e, a: m.a}; state.tries = 0; state.phase = "pass"; render(); };
    grid.appendChild(btn);
  });
  document.getElementById("custom-submit").onclick = () => {
    const t = document.getElementById("custom-title").value.trim();
    const e = document.getElementById("custom-emoji").value.trim();
    if (!t || !e) return;
    state.current = {t, e, a: []};
    state.tries = 0;
    state.phase = "pass";
    render();
  };
}

function renderPass(){
  const stage = document.getElementById("stage");
  stage.innerHTML = `
    <div class="pass-box">
      <div class="icon">🎬</div>
      <p class="lead">Pass the screen to <strong>${escapeHtml(state.players[guesserIdx()])}</strong></p>
      <button class="primary" id="ready-btn">I'm ready to guess</button>
    </div>
  `;
  document.getElementById("ready-btn").onclick = () => { state.phase = "guess"; render(); };
}

function renderGuess(){
  const stage = document.getElementById("stage");
  const triesLeft = MAX_TRIES - state.tries;
  stage.innerHTML = `
    <div class="screen-display"><p class="emoji-line">${state.current.e}</p></div>
    <div class="guess-meta">
      <span>${escapeHtml(state.players[guesserIdx()])}, name that movie</span>
      <span class="tries-left">${triesLeft} ${triesLeft === 1 ? 'try' : 'tries'} left</span>
    </div>
    ${state.lastWrongGuess ? `<p class="wrong-note">"${escapeHtml(state.lastWrongGuess)}" wasn't it</p>` : ""}
    <input type="text" id="guess-input" placeholder="Movie title" />
    <div class="action-row">
      <button class="primary" id="submit-guess" style="flex:1;">Submit guess</button>
      <button id="give-up">Give up</button>
    </div>
  `;
  const input = document.getElementById("guess-input");
  input.focus();
  input.addEventListener("keydown", (ev) => { if (ev.key === "Enter") checkGuess(input.value); });
  document.getElementById("submit-guess").onclick = () => checkGuess(input.value);
  document.getElementById("give-up").onclick = () => finishRound(false);
}

function checkGuess(val){
  if (!val.trim()) return;
  const ok = norm(val) === norm(state.current.t) || state.current.a.some(a => norm(a) === norm(val));
  if (ok) { finishRound(true); return; }
  state.tries += 1;
  state.lastWrongGuess = val.trim();
  if (state.tries >= MAX_TRIES) { finishRound(false); return; }
  render();
}

function finishRound(correct){
  state.lastCorrect = correct;
  if (correct) state.scores[guesserIdx()] += 1;
  state.lastWrongGuess = "";
  state.phase = "result";
  render();
}

function renderResult(){
  const stage = document.getElementById("stage");
  const winnerName = state.players[guesserIdx()];
  stage.innerHTML = `
    <div class="result-box">
      <div class="icon ${state.lastCorrect ? 'status-correct' : 'status-wrong'}">${state.lastCorrect ? '✅' : '❌'}</div>
      <p class="lead">${state.lastCorrect ? escapeHtml(winnerName) + " got it right" : "Out of tries"}</p>
      <p class="result-title">${escapeHtml(state.current.t)}</p>
      <button class="primary" id="next-round">Next round</button>
    </div>
  `;
  document.getElementById("next-round").onclick = () => {
    state.turnPointer = (state.turnPointer + 1) % numPlayersCount();
    state.current = null;
    state.tries = 0;
    state.phase = "setup";
    render();
  };
}

function render(){
  renderScoreboard();
  if (state.phase === "players") renderPlayerSetup();
  else if (state.phase === "setup") renderSetup();
  else if (state.phase === "pass") renderPass();
  else if (state.phase === "guess") renderGuess();
  else if (state.phase === "result") renderResult();
}

render();
</script>
</body>
</html>
